[cursor]
#style = {shape = "Underline", blinking = "Always"}
#vi_mode_style = {shape = "Underline,block,beam", blinking = "Always"}
style = {shape = "block", blinking = "Always"}
vi_mode_style = {shape = "block", blinking = "Always"}
# thickness = 0.25

[colors.cursor]
cursor = "#FFFFFF"
text = "#3B4252"

[env]
LANG = "en_US.UTF-8"
LC_CTYPE = "en_US.UTF-8"
TERM = "xterm-256color"
WINIT_X11_SCALE_FACTOR = "1.0"

[font]
size = 12

# [font.bold]
# family = "JetBrainsMono Nerd Font"
# style = "Bold"
# 
# [font.bold_italic]
# family = "JetBrainsMono Nerd Font"
# style = "Bold Italic"
# 
# [font.italic]
# family = "JetBrainsMono Nerd Font"
# style = "Italic"
# 
# [font.normal]
# family = "JetBrainsMono Nerd Font"

[font.bold]
family = "IosevkaTerm Nerd Font"
style = "Bold"

[font.bold_italic]
family = "IosevkaTerm Nerd Font"
style = "Bold Italic"

[font.italic]
family = "IosevkaTerm Nerd Font"
style = "Italic"

[font.normal]
family = "IosevkaTerm Nerd Font"

[mouse]
hide_when_typing = true

[window.padding]
x = 30 
y = 10 

[general]
#theme = "Dracula"
import = [
    "~/.config/alacritty/themes/themes/gruber_darker.toml"
]
